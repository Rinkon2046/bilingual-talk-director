<!--
  示例 · "销售 10 个坑" 主题(约 16 秒)
  演示:章节条 + 双语字幕 + 强调大标题 + 收尾产品卡。
  自包含,可直接 npx hyperframes preview。背景视频与图片请放到 ../assets/。
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@500;700;900&display=swap');
  :root{--hl:#EC6A35;--zh:#fff;--en:#C7C4BD;--label:#9A958B;
    --card-bg:rgba(22,20,18,.86);--card-border:rgba(255,255,255,.10);--pill-bg:rgba(236,106,53,.16);
    --track:rgba(255,255,255,.16);--font-zh:"Noto Sans SC",sans-serif;--font-mono:"JetBrains Mono",monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  #root{position:relative;width:1080px;height:1920px;overflow:hidden;background:#000;font-family:var(--font-zh)}
  .bg-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.28),rgba(0,0,0,0) 26%,rgba(0,0,0,0) 55%,rgba(0,0,0,.62))}
  .chapter-bar{position:absolute;top:46px;left:40px;right:40px;display:flex;gap:22px}
  .chapter{flex:1;font-family:var(--font-mono);font-size:21px;color:var(--label)}
  .chapter .lab{display:block;margin-bottom:10px;white-space:nowrap;font-weight:500}
  .chapter .track{height:4px;border-radius:4px;background:var(--track);overflow:hidden}
  .chapter .fill{height:100%;background:var(--hl);transform:scaleX(0);transform-origin:left}
  .chapter.done .lab{color:#E9E6E0}.chapter.done .fill{transform:scaleX(1)}
  .chapter.active .lab{color:#fff;font-weight:600}
  .subtitle{position:absolute;left:60px;right:60px;bottom:150px;text-align:center}
  .cue{position:absolute;left:0;right:0;bottom:0;opacity:0}
  .cue .zh{font-weight:900;color:var(--zh);font-size:62px;line-height:1.28;text-shadow:0 3px 22px rgba(0,0,0,.55)}
  .cue .en{font-family:var(--font-mono);font-weight:500;color:var(--en);font-size:30px;line-height:1.45;margin-top:14px;text-shadow:0 2px 14px rgba(0,0,0,.5)}
  .hl{color:var(--hl)}
  .bigtitle{position:absolute;left:70px;right:70px;top:600px;opacity:0;font-weight:900;color:#fff;font-size:104px;line-height:1.16;text-align:center;text-shadow:0 4px 30px rgba(0,0,0,.5)}
  .card{position:absolute;left:46px;right:46px;top:150px;opacity:0;background:var(--card-bg);border:1px solid var(--card-border);border-radius:26px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.45)}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .card-head .dot{width:10px;height:10px;border-radius:50%;background:var(--hl)}
  .card-head .src{font-family:var(--font-mono);font-size:22px;color:var(--label)}
  .card-head .pill{margin-left:auto;font-family:var(--font-mono);font-size:20px;color:var(--hl);background:var(--pill-bg);border-radius:999px;padding:6px 16px}
  .browser{background:#fff;border-radius:14px;padding:26px 28px;color:#1b1a17}
  .browser .q{font-weight:700;font-size:34px}
  .browser mark{background:#111;color:#fff;padding:0 6px;border-radius:4px}
  .brand{font-weight:900;color:var(--hl);font-size:64px;margin-top:18px}
  .tagline{color:#cfccc4;font-size:26px;margin-top:4px}
</style>
</head>
<body>
<div id="root" data-composition-id="root" data-start="0" data-width="1080" data-height="1920">
  <video class="bg-video" src="../assets/bg.mp4" playsinline data-start="0" data-duration="16" data-track-index="0"></video>
  <div class="overlays" data-start="0" data-duration="16" data-track-index="1">
    <div class="scrim"></div>

    <div class="chapter-bar">
      <div class="chapter done c0"><span class="lab">开场</span><div class="track"><div class="fill"></div></div></div>
      <div class="chapter active c1"><span class="lab">坑 1-3</span><div class="track"><div class="fill"></div></div></div>
      <div class="chapter c2"><span class="lab">坑 4-6</span><div class="track"><div class="fill"></div></div></div>
      <div class="chapter c3"><span class="lab">坑 7-8</span><div class="track"><div class="fill"></div></div></div>
      <div class="chapter c4"><span class="lab">坑 9-10</span><div class="track"><div class="fill"></div></div></div>
      <div class="chapter c5"><span class="lab">护城河</span><div class="track"><div class="fill"></div></div></div>
    </div>

    <!-- 收尾产品卡 -->
    <div class="card" id="cardProd">
      <div class="card-head"><span class="dot"></span><span class="src">hedj.io · Personal Career OS</span><span class="pill">我做的</span></div>
      <div class="browser"><div class="q">How long until AI <mark>replaces</mark> you?</div></div>
      <div class="brand">Hedj</div>
      <div class="tagline">帮你在 AI 时代,建立自己的职业护城河</div>
    </div>

    <!-- 强调大标题 -->
    <div class="bigtitle" id="title1">被<span class="hl">面子</span><br>和利益裹挟</div>

    <div class="subtitle">
      <div class="cue" id="cue1"><div class="zh">老派销售最爱看《<span class="hl">华尔街之狼</span>》</div><div class="en">old sellers love <span class="hl">The Wolf of Wall Street</span></div></div>
      <div class="cue" id="cue2"><div class="zh">但真正的销售是<span class="hl">信任</span>和<span class="hl">真诚</span></div><div class="en">but real selling is <span class="hl">trust</span> and <span class="hl">honesty</span></div></div>
      <div class="cue" id="cue3"><div class="zh">建立 AI 也替不掉的职业<span class="hl">护城河</span></div><div class="en">build a career <span class="hl">moat</span> AI can't replace</div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
  const tl = gsap.timeline({ paused: true });

  // 章节进度(当前章 0–16s 填充)
  tl.to('.c1 .fill', { scaleX: 1, duration: 16, ease: 'none' }, 0);

  // cue1 0–5
  tl.fromTo('#cue1', {opacity:0,y:30}, {opacity:1,y:0,duration:.35,ease:'power2.out'}, 0);
  tl.to('#cue1', {opacity:0,duration:.3}, 4.7);
  // 大标题金句 5–7.5(字幕暂歇)
  tl.fromTo('#title1', {opacity:0,scale:.92}, {opacity:1,scale:1,duration:.5,ease:'power2.out'}, 5);
  tl.to('#title1', {opacity:0,duration:.35}, 7.2);
  // cue2 8–12
  tl.fromTo('#cue2', {opacity:0,y:30}, {opacity:1,y:0,duration:.35,ease:'power2.out'}, 8);
  tl.to('#cue2', {opacity:0,duration:.3}, 11.7);
  // cue3 12–16 + 收尾产品卡 12.3–16
  tl.fromTo('#cue3', {opacity:0,y:30}, {opacity:1,y:0,duration:.35,ease:'power2.out'}, 12);
  tl.fromTo('#cardProd', {opacity:0,scale:.96,y:22}, {opacity:1,scale:1,y:0,duration:.45,ease:'power2.out'}, 12.3);

  // 补足总时长 = 背景视频 16s
  tl.set({}, {}, 16);
  window.__timelines = window.__timelines || {};
  window.__timelines['root'] = tl;
</script>
</body>
</html>
